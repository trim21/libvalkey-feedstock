# yaml-language-server: $schema=https://cdn.jsdelivr.net/gh/prefix-dev/recipe-format/schema.json

schema_version: 1

context:
  name: libvalkey
  version: "0.1.0"

package:
  name: "${{ name }}"
  version: "${{ version }}"

source:
  url: https://github.com/valkey-io/libvalkey/archive/refs/tags/${{ version }}.zip
  sha256: "118e4cf50daf32645d267740f431e81c91bc85f332ea14a8051ddab59bba79c5"

build:
  script:
    env:
      CMAKE_GENERATOR: "Ninja"
    content:
      - mkdir build
      - popd build
      - if: linux
        then: cmake ${CMAKE_ARGS} -DENABLE_TLS=1 -DENABLE_RDMA=1 ..
        else: cmake ${CMAKE_ARGS} -DENABLE_TLS=1 ..
      - ninja -v install

requirements:
  build:
    - "${{ compiler('c') }}"
    - ninja
    - cmake
    - if: win
      then: "${{ compiler('cxx') }}"

  host:
    - openssl>=3
    - libevent
    - if: linux
      then: rdma-core

about:
  license: MIT
  license_file:
    - COPYING
  summary: Valkey client library in C
  description: |
    this package is build from
    [https://github.com/trim21/libvalkey-feedstock](https://github.com/trim21/libvalkey-feedstock)
  homepage: https://github.com/valkey-io/libvalkey
  repository: https://github.com/valkey-io/libvalkey
